name: release-wks

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            asset: linux-x64
          - os: macos-13
            target: bun-darwin-x64
            asset: darwin-x64
          - os: macos-14
            target: bun-darwin-arm64
            asset: darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tui/package-lock.json

      - name: Install dependencies
        working-directory: tui
        run: npm ci

      - name: Build _wks binary
        working-directory: tui
        run: |
          mkdir -p release
          bun build --compile --target ${{ matrix.target }} --outfile release/_wks src/cli/index.ts
          tar -C release -czf release/_wks-${{ matrix.asset }}.tar.gz _wks

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wks-${{ matrix.asset }}
          path: tui/release/_wks-${{ matrix.asset }}.tar.gz

  release:
    name: publish-release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum _wks-*.tar.gz > SHA256SUMS.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/_wks-*.tar.gz
            dist/SHA256SUMS.txt
          generate_release_notes: true
